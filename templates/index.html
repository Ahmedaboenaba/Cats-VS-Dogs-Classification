<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cats vs Dogs Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f5f7ff;
            transform: scale(1.02);
        }

        .upload-area.active {
            border-color: #764ba2;
            background: #eef1ff;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview-area {
            margin: 30px 0;
            display: none;
        }

        .preview-area.show {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .prediction-result {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid #667eea;
        }

        .prediction-result.cat {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .prediction-result.dog {
            border-left-color: #2196f3;
            background: #e3f2fd;
        }

        .prediction-label {
            font-size: 2em;
            font-weight: 700;
            margin: 10px 0;
        }

        .confidence {
            margin: 15px 0;
        }

        .confidence-label {
            color: #666;
            font-size: 0.95em;
        }

        .confidence-score {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
            display: none;
        }

        .message.show {
            display: block;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
            min-height: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐱🐶 Cats vs Dogs</h1>
            <p>AI-Powered Image Classifier</p>
        </div>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload or drag an image</div>
                <div class="upload-subtext">JPG, PNG • Max 16MB</div>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" required>
            </div>
            <div class="file-name" id="fileName"></div>

            <button type="submit" class="btn btn-primary">Analyze Image</button>
        </form>

        <div id="message" class="message"></div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #667eea;">Analyzing image...</p>
        </div>

        <div id="previewArea" class="preview-area">
            <img id="previewImage" class="preview-image" src="" alt="Preview">

            <div id="predictionResult" class="prediction-result">
                <div style="color: #666; font-size: 0.9em;">Prediction</div>
                <div class="prediction-label" id="predictionLabel">-</div>
                <div class="confidence">
                    <div class="confidence-label">Confidence</div>
                    <div class="confidence-score" id="confidenceScore">0%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Built with TensorFlow & Flask</p>
            <p>Model Accuracy: ~85% on validation set</p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const predictionResult = document.getElementById('predictionResult');
        const predictionLabel = document.getElementById('predictionLabel');
        const confidenceScore = document.getElementById('confidenceScore');
        const confidenceFill = document.getElementById('confidenceFill');

        // Drag and drop
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('active');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('active');
            fileInput.files = e.dataTransfer.files;
            updateFileName();
        });

        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (fileInput.files.length > 0) {
                fileName.textContent = `Selected: ${fileInput.files[0].name}`;
            } else {
                fileName.textContent = '';
            }
        }

        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!fileInput.files.length) {
                showMessage('Please select an image', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            showLoading(true);
            hideMessage();

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    displayPrediction(data);
                    showMessage('✓ Prediction successful!', 'success');
                } else {
                    showMessage(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showMessage(`Network error: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        });

        function displayPrediction(data) {
            previewImage.src = data.image;
            previewArea.classList.add('show');

            const label = data.prediction;
            const confidence = data.confidence_score;

            predictionLabel.textContent = label;
            confidenceScore.textContent = data.confidence;
            confidenceFill.style.width = (confidence * 100) + '%';

            predictionResult.classList.remove('cat', 'dog');
            predictionResult.classList.add(label.toLowerCase());
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message show ${type}`;
        }

        function hideMessage() {
            message.classList.remove('show');
        }

        function showLoading(show) {
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }
    </script>
</body>
</html>
